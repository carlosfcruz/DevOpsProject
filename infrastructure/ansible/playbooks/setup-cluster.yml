# ─────────────────────────────────────────────────────────
# Playbook: Kubernetes (K3s) & ArgoCD Provisioning
# ─────────────────────────────────────────────────────────
# Automates the installation of a lightweight Kubernetes
# cluster and the initial bootstrapping of ArgoCD for GitOps.
# ─────────────────────────────────────────────────────────

---
- name: Provision Kubernetes Cluster and CI/CD Foundation
  hosts: app_servers
  become: true

  tasks:
    # ─── 1. K3s Installation ───
    - name: Download and execute the K3s installation script
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s
      register: k3s_install

    - name: Ensure K3s service is enabled and started
      ansible.builtin.systemd:
        name: k3s
        state: started
        enabled: true

    - name: Wait for the Kubernetes API to become responsive
      ansible.builtin.wait_for:
        port: 6443
        delay: 5
        timeout: 60

    - name: Ensure python3-pip is installed
      ansible.builtin.apt:
        name: python3-pip
        state: present
        update_cache: yes

    - name: Ensure the python kubernetes library is installed
      ansible.builtin.pip:
        name: kubernetes
        state: present
        executable: pip3

    # ─── 2. ArgoCD Installation ───
    - name: Create the ArgoCD namespace
      kubernetes.core.k8s:
        name: argocd
        api_version: v1
        kind: Namespace
        state: present
        kubeconfig: /etc/rancher/k3s/k3s.yaml

    - name: Apply the ArgoCD installation manifests
      kubernetes.core.k8s:
        namespace: argocd
        src: https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
        kubeconfig: /etc/rancher/k3s/k3s.yaml

    - name: Wait for the ArgoCD server deployment to become available
      kubernetes.core.k8s_info:
        kind: Deployment
        name: argocd-server
        namespace: argocd
        kubeconfig: /etc/rancher/k3s/k3s.yaml
      register: argocd_status
      until: "argocd_status.resources[0].status.readyReplicas | default(0) > 0"
      retries: 30
      delay: 10

    # ─── 3. Credential Extraction ───
    - name: Retrieve the auto-generated ArgoCD admin password
      kubernetes.core.k8s_info:
        kind: Secret
        name: argocd-initial-admin-secret
        namespace: argocd
        kubeconfig: /etc/rancher/k3s/k3s.yaml
      register: argocd_secret

    - name: Display the decoded ArgoCD admin password
      ansible.builtin.debug:
        msg: "ArgoCD admin password: {{ argocd_secret.resources[0].data.password | b64decode }}"
