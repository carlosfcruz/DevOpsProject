---
- name: Download and execute the K3s installation script
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | sh -
  args:
    creates: /usr/local/bin/k3s
  register: k3s_install
  notify: Restart K3s

- name: Ensure K3s service is enabled and started
  ansible.builtin.systemd:
    name: k3s
    state: started
    enabled: true

- name: Wait for the Kubernetes API to become responsive
  ansible.builtin.wait_for:
    port: 6443
    delay: 5
    timeout: 120

- name: Ensure python3-pip is installed
  ansible.builtin.apt:
    name: python3-pip
    state: present
    update_cache: yes

- name: Ensure the python kubernetes library is installed
  ansible.builtin.pip:
    name: kubernetes
    state: present
    executable: pip3

- name: Force handlers to run immediately
  ansible.builtin.meta: flush_handlers
