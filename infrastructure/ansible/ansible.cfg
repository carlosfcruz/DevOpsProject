# ─────────────────────────────────────────────────────────
# Ansible Configuration
# ─────────────────────────────────────────────────────────
# Global settings controlling Ansible behavior.
# Placed in the project root so it is automatically detected
# when running ansible-playbook from this directory.
# ─────────────────────────────────────────────────────────

[defaults]
# Path to the inventory file listing target hosts.
inventory = inventory.ini

# SSH user for connecting to remote hosts.
remote_user = ubuntu

# Disable host key checking for dynamic/ephemeral infrastructure.
# In production, this should be enabled or managed via known_hosts.
host_key_checking = False

# Suppress deprecation warnings during playbook execution.
deprecation_warnings = False

# Reduce SSH connection noise in output.
[ssh_connection]
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
